<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CodeChat Profile</title>
    <meta name="description" content="CodeChat プロフィールページ">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!--リセットCSS-->
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">

    <!--Googleフォント-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Philosopher&display=swap">

    <!--オリジナルCSS-->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="page-header">
        <div class="glitch-wrapper">
            <h1 class="align-center font-english">
                <a href="home.html" class="glitch" data-text="CodeChat">CodeChat</a>
            </h1>
        </div>
        <form class="post-form post-form--open" action="#" method="get">
            <div class="post-form__content">
                <div class="post-form__input-group">
                    <div class="autocomplete-wrapper">
                        <input id="post-text" name="postText" type="text" placeholder="ここに投稿文を入力してください...">
                        <ul class="autocomplete-list" id="autocomplete-list"></ul>
                    </div>
                    <button type="submit" class="post-form__submit">→</button>
                </div>
            </div>
            <button type="button" class="post-form__open" aria-label="開く">＋</button>
        </form>
    </header>
    <main class="home-main">
        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-banner"></div>
                <div class="profile-info-wrapper">
                    <div class="profile-avatar-wrapper">
                        <div class="profile-avatar">👤</div>
                    </div>
                    <div class="profile-details">
                        <h2 class="profile-name" id="profile-name">ユーザー名</h2>
                        <p class="profile-id" id="profile-id">@userid</p>
                        <p class="profile-bio" id="profile-bio">プロフィールの説明文</p>
                        <div class="profile-stats">
                            <div class="profile-stat">
                                <span class="profile-stat-value" id="profile-posts">0</span>
                                <span class="profile-stat-label">投稿</span>
                            </div>
                            <div class="profile-stat">
                                <span class="profile-stat-value" id="profile-followers">0</span>
                                <span class="profile-stat-label">フォロワー</span>
                            </div>
                            <div class="profile-stat">
                                <span class="profile-stat-value" id="profile-follows">0</span>
                                <span class="profile-stat-label">フォロー中</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="profile-content">
                <div class="profile-info-details">
                    <h3>プロフィール編集</h3>
                    <p>プロフィールの編集はコマンド入力で行います。投稿欄に <code>/edit profile あなたの自己紹介</code> のように入力してください。<br>
                    アイコン画像とヘッダー画像は <code>/edit icon</code>、<code>/edit header</code> を入力してファイル選択してください。</p>
                    <div class="profile-display-bio">
                        <p><strong>プロフィール</strong></p>
                        <p id="profile-display-text">プロフィールの詳細説明文がここに表示されます。</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!--Markdown レンダリング + XSS サニタイズ-->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

    <!--ブラウザ内 SQLite (WebAssembly)-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script>
        // CDN から sql-wasm.js が読み込まれなかった場合のフォールバック
        if (typeof initSqlJs === 'undefined') {
            console.error('SQL.jsが読み込まれていません。別の方法で読み込みます。');
            var script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql.js';
            document.head.appendChild(script);
        }
    </script>

    <!--アプリケーション本体-->
    <script src="js/script.js"></script>
</body>
</html>
